/* ===== 仙劍式回合制戰鬥畫面試作版 by ChatGPT ===== */

/* ===== v8.9.9 存檔安全層 ===== */
function safeReadSave(key){
  try{
    var raw = localStorage.getItem(key);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(err){
    console.warn("存檔讀取失敗", err);
    return null;
  }
}
function safeWriteSave(key,data){
  try{
    localStorage.setItem(key, JSON.stringify(data));
    return true;
  }catch(err){
    console.warn("存檔寫入失敗", err);
    return false;
