/* ===== 仙劍式回合制戰鬥畫面試作版 by ChatGPT ===== */
.arena{
  position:relative;
  height:100%;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 8%, rgba(245,220,150,.18), transparent 28%),
    linear-gradient(180deg,#101a2e 0%,#1a2434 42%,#0a0d13 100%);
}
.arena:before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 25% 32%, rgba(68,139,104,.25), transparent 22%),
    radial-gradient(circle at 75% 30%, rgba(67,92,142,.22), transparent 24%),
    linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.42));
  filter:saturate(1.15);
}
.fighters{
  position:relative;
  flex:1;
  min-height:310px;
  padding:18px 14px 92px;
  display:grid;
  grid-template-columns:1fr 74px 1fr;
  align-items:end;
  gap:0;
  border-bottom:1px solid rgba(245,215,75,.28);
  background:
    linear-gradient(180deg,rgba(19,31,55,.6),rgba(6,8,16,.18) 50%,rgba(0,0,0,.38)),
    radial-gradient(ellipse at center bottom,rgba(139,105,48,.45),transparent 48%);
}
.fighters:before{
  content:"";
  position:absolute;
  left:-10%;right:-10%;bottom:22px;height:92px;
  background:radial-gradient(ellipse at center,rgba(168,128,65,.46),rgba(45,33,22,.32) 58%,transparent 73%);
  transform:perspective(500px) rotateX(60deg);
  border-radius:50%;
  opacity:.9;
}
.fighters:after{
  content:"仙途問道 · 回合戰鬥";
  position:absolute;
  top:12px;left:50%;transform:translateX(-50%);
  padding:5px 14px;
  border:1px solid rgba(245,215,75,.36);
  border-radius:999px;
  background:rgba(3,5,13,.46);
  color:#f5d77f;
  font-size:12px;
  letter-spacing:2px;
  box-shadow:0 0 18px rgba(245,215,75,.08);
}
.fighter{
  position:relative;
  z-index:1;
  min-width:0;
  text-align:center;
  padding:12px 8px 10px;
  border:1px solid rgba(245,215,75,.2);
  border-radius:14px;
  background:linear-gradient(180deg,rgba(4,7,16,.24),rgba(4,7,16,.62));
  box-shadow:0 16px 28px rgba(0,0,0,.28);
  backdrop-filter:blur(3px);
}
.fighter:first-child{transform:translateY(-4px);}
.fighter:last-child{transform:translateY(-18px);}
.fighter .big{
  height:96px;
  display:grid;
  place-items:center;
  font-size:76px;
  line-height:1;
  filter:drop-shadow(0 16px 10px rgba(0,0,0,.45));
  animation:battleIdle 1.9s ease-in-out infinite;
}
.fighter:last-child .big{animation:battleEnemyIdle 1.7s ease-in-out infinite;}
.fighters>b{
  position:relative;
  z-index:2;
  align-self:center;
  justify-self:center;
  width:54px;height:54px;
  display:grid;place-items:center;
  border-radius:50%;
  color:#2b1708;
  background:radial-gradient(circle,#ffe6a3,#b87927 70%);
  border:2px solid rgba(255,244,188,.75);
  box-shadow:0 0 22px rgba(245,215,75,.28);
  font-size:16px;
}
.controls{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:repeat(2,minmax(120px,1fr));
  gap:8px;
  padding:12px;
  background:linear-gradient(180deg,rgba(12,8,18,.96),rgba(5,7,13,.98));
  border-top:1px solid rgba(245,215,75,.28);
  border-bottom:1px solid rgba(245,215,75,.15);
  box-shadow:0 -16px 28px rgba(0,0,0,.35);
}
.controls .btn{
  min-height:42px;
  border-radius:8px;
  border-color:rgba(245,215,75,.34);
  background:linear-gradient(180deg,rgba(107,73,26,.38),rgba(41,26,14,.58));
  color:#f1d891;
  text-shadow:0 1px 0 rgba(0,0,0,.8);
}
.controls .btn:hover:not(:disabled),.controls .btn:active:not(:disabled){
  transform:translateY(-1px);
  box-shadow:0 0 16px rgba(245,215,75,.18);
}
.controls .muted{
  grid-column:1/-1;
  padding:6px 8px;
  border-radius:6px;
  background:rgba(255,255,255,.035);
}
.log{
  position:relative;
  z-index:2;
  max-height:120px;
  flex:0 0 120px;
  padding:10px 14px;
  line-height:1.7;
  font-size:12px;
  background:rgba(0,0,0,.38);
  border-top:1px solid rgba(255,255,255,.06);
}
.log div:last-child{animation:logPop .25s ease-out;}
.arena .bar{height:8px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.38)}
.arena small{color:#e9d9b0;font-weight:700;text-shadow:0 1px 3px #000}
@keyframes battleIdle{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-7px) scale(1.03)}}
@keyframes battleEnemyIdle{0%,100%{transform:translateY(0) rotate(-1deg) scale(1)}50%{transform:translateY(-9px) rotate(1deg) scale(1.04)}}
@keyframes logPop{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
@media (max-width:520px){
  .fighters{grid-template-columns:1fr 46px 1fr;padding-left:8px;padding-right:8px;min-height:285px}
  .fighter{padding:10px 5px;font-size:12px}
  .fighter .big{height:78px;font-size:60px}
  .fighters>b{width:42px;height:42px;font-size:13px}
  .controls{grid-template-columns:repeat(2,1fr);padding:9px;gap:7px}
  .controls .btn{min-height:38px;padding:7px 6px;font-size:12px}
}


/* ===== 人物頭像圖片化 ===== */
.avatar{overflow:hidden;padding:0;background:#05060a!important}
.avatar img{width:100%;height:100%;object-fit:cover;display:block;border-radius:50%}


/* ===== 修正版：戰鬥畫面不遮擋上方資訊 + 手機版高度調整 ===== */
.main{min-height:0;overflow:hidden;}
.arena{
  height:100%;
  min-height:0;
  display:grid!important;
  grid-template-rows:minmax(188px,1fr) auto minmax(78px,108px);
}
.fighters{
  flex:none!important;
  min-height:0!important;
  height:auto!important;
  padding:42px 10px 44px!important;
  overflow:hidden;
  align-items:end!important;
}
.fighters:after{top:7px!important;font-size:11px!important;padding:4px 12px!important;z-index:3;}
.fighters:before{bottom:8px!important;height:66px!important;}
.fighter{padding:8px 5px 7px!important;max-width:100%;}
.fighter .big{height:66px!important;font-size:52px!important;}
.fighter:first-child,.fighter:last-child{transform:none!important;}
.fighters>b{width:42px!important;height:42px!important;font-size:13px!important;}
.controls{
  position:relative!important;
  z-index:4!important;
  padding:8px 10px!important;
  gap:7px!important;
  grid-template-columns:repeat(2,minmax(0,1fr))!important;
}
.controls .btn{min-height:34px!important;padding:6px 8px!important;font-size:12px!important;}
.controls .muted{font-size:11px!important;padding:5px 7px!important;}
.log{
  position:relative!important;
  z-index:4!important;
  max-height:none!important;
  height:100%!important;
  min-height:78px!important;
  flex:none!important;
  padding:7px 12px!important;
  font-size:11px!important;
  line-height:1.55!important;
}
@media (max-width:520px){
  .arena{grid-template-rows:minmax(170px,1fr) auto minmax(72px,98px);}
  .fighters{grid-template-columns:1fr 38px 1fr!important;padding:38px 6px 36px!important;}
  .fighter .big{height:54px!important;font-size:44px!important;}
  .fighter{font-size:11px!important;border-radius:10px!important;}
  .fighter .barrow,.fighter small{font-size:9px!important;}
  .fighters>b{width:34px!important;height:34px!important;font-size:11px!important;}
  .controls{padding:7px!important;gap:6px!important;}
  .controls .btn{min-height:31px!important;font-size:11px!important;padding:5px!important;}
  .log{min-height:72px!important;font-size:10.5px!important;}
}
@media (max-height:680px){
  .top{padding:6px 8px!important;gap:6px!important;}
  .avatar{width:38px!important;height:38px!important;}
  .chip{padding:4px 6px!important;font-size:11px!important;}
  .barrow{font-size:9px!important;}
  .nav{padding:4px!important;}
  .nav button{padding:5px 1px!important;font-size:10px!important;}
  .arena{grid-template-rows:minmax(148px,1fr) auto minmax(60px,86px);}
  .fighters{padding-top:34px!important;padding-bottom:26px!important;}
  .fighter .big{height:46px!important;font-size:38px!important;}
  .log{min-height:60px!important;}
}
